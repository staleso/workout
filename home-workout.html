<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hjemmetrening</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    #app { max-width: 480px; margin: 0 auto; padding: 16px 16px 80px; }

    h1 { font-size: 1.6rem; font-weight: 700; }
    h2 { font-size: 1.2rem; font-weight: 600; }
    h3 { font-size: 1rem; font-weight: 600; }

    .subtitle { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; margin-bottom: 20px; }

    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary  { background: #3b82f6; color: #fff; }
    .btn-success  { background: #22c55e; color: #fff; }
    .btn-danger   { background: #ef4444; color: #fff; }
    .btn-ghost    { background: #1e293b; color: #94a3b8; }
    .btn-outline  { background: transparent; border: 1.5px solid #3b82f6; color: #3b82f6; }
    .btn-full     { width: 100%; display: block; text-align: center; padding: 14px; }
    .btn-sm       { padding: 6px 12px; font-size: 0.82rem; }

    .nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .nav-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #1e293b;
      color: #94a3b8;
      transition: all 0.15s;
    }
    .nav-btn.active { background: #3b82f6; color: #fff; }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: #1e293b;
      border: none;
      border-radius: 10px;
      color: #94a3b8;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .tag { color: #64748b; font-size: 0.8rem; }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #334155;
      color: #94a3b8;
    }
    .badge-green { background: #14532d; color: #86efac; }
    .badge-blue  { background: #1e3a5f; color: #93c5fd; }
    .badge-orange{ background: #431407; color: #fdba74; }

    .empty-state {
      text-align: center;
      color: #475569;
      padding: 40px 20px;
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Workout card */
    .workout-card {
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .workout-card:hover { border-color: #3b82f6; }

    .workout-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* Exercise list */
    .exercise-item {
      background: #0f172a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }

    /* Session */
    .session-card {
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .progress-bar {
      background: #334155;
      border-radius: 4px;
      height: 8px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: #22c55e;
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }

    .set-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .set-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .set-btn.done {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    .set-btn.active-set {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    /* Timer */
    .timer-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }
    .timer-display {
      font-size: 3rem;
      font-weight: 700;
      color: #22c55e;
      font-variant-numeric: tabular-nums;
    }
    .timer-label { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

    .timer-btns { display: flex; gap: 10px; margin-top: 16px; }

    /* Log */
    .log-item {
      border-bottom: 1px solid #1e293b;
      padding: 10px 0;
    }
    .log-item:last-child { border-bottom: none; }

    /* Active exercise highlight */
    .session-card.current {
      border: 2px solid #3b82f6;
    }
    .session-card.completed-ex {
      opacity: 0.6;
    }

    /* Rest overlay */
    #rest-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #rest-overlay.show { display: flex; }
    #rest-overlay h2 { font-size: 1.3rem; margin-bottom: 8px; }
    #rest-overlay .rest-time {
      font-size: 4rem;
      font-weight: 800;
      color: #3b82f6;
      font-variant-numeric: tabular-nums;
    }
    #rest-overlay .rest-sub { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
  </style>
</head>
<body>
<div id="app"></div>

<!-- Rest overlay -->
<div id="rest-overlay">
  <h2>Hvil</h2>
  <div class="rest-time" id="rest-time-display">60</div>
  <div class="rest-sub">Neste: <span id="rest-next"></span></div>
  <button class="btn btn-primary" onclick="skipRest()">Hopp over</button>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const WORKOUTS = [
  {
    id: 'beginner-full',
    name: 'Nybegynner fullkropp',
    level: 'Nybegynner',
    duration: '20 min',
    category: 'Styrke',
    exercises: [
      { name: 'Knebøy', sets: 3, reps: '12', rest: 60, desc: 'Føtter skulderbredde, knærne over tærne' },
      { name: 'Push-ups', sets: 3, reps: '8-10', rest: 60, desc: 'Hold kroppen rett som en planke' },
      { name: 'Utfall', sets: 3, reps: '10 per ben', rest: 60, desc: 'Steg fremover, kne nær gulvet' },
      { name: 'Planke', sets: 3, reps: '20 sek', rest: 45, desc: 'Albuer rett under skuldrene' },
      { name: 'Superman', sets: 3, reps: '12', rest: 45, desc: 'Løft armer og ben samtidig fra magen' },
    ]
  },
  {
    id: 'push-upper',
    name: 'Overkropp push',
    level: 'Middels',
    duration: '25 min',
    category: 'Styrke',
    exercises: [
      { name: 'Wide push-ups', sets: 4, reps: '12', rest: 60, desc: 'Hender bredt fra hverandre' },
      { name: 'Diamond push-ups', sets: 3, reps: '10', rest: 60, desc: 'Hender nær hverandre, danner en diamant' },
      { name: 'Pike push-ups', sets: 3, reps: '10', rest: 60, desc: 'Hofter høyt, trener skuldrene' },
      { name: 'Dips (stol)', sets: 3, reps: '12', rest: 60, desc: 'Bruk en stol bak deg, bøy armene' },
      { name: 'Planche lean', sets: 3, reps: '20 sek', rest: 45, desc: 'Push-up posisjon, len deg fremover' },
    ]
  },
  {
    id: 'legs-glutes',
    name: 'Ben og rumpe',
    level: 'Middels',
    duration: '30 min',
    category: 'Styrke',
    exercises: [
      { name: 'Jump squat', sets: 4, reps: '15', rest: 60, desc: 'Eksplosivt opp, myk landing' },
      { name: 'Bulgarske split squat', sets: 3, reps: '10 per ben', rest: 75, desc: 'Bakre fot på stol eller sofa' },
      { name: 'Glute bridge', sets: 4, reps: '15', rest: 45, desc: 'Skyv hofter opp, klem rumpa' },
      { name: 'Enbens knebøy (assistert)', sets: 3, reps: '8 per ben', rest: 60, desc: 'Hold i en vegg for balanse' },
      { name: 'Calf raises', sets: 3, reps: '20', rest: 30, desc: 'Reis deg på tærne, sakte ned' },
    ]
  },
  {
    id: 'hiit-cardio',
    name: 'HIIT Kondisjon',
    level: 'Hard',
    duration: '20 min',
    category: 'Kondisjon',
    exercises: [
      { name: 'Jumping jacks', sets: 4, reps: '30 sek', rest: 15, desc: '30 sek på, 15 sek pause' },
      { name: 'Burpees', sets: 4, reps: '10', rest: 30, desc: 'Hel bevegelse ned og opp med hopp' },
      { name: 'Mountain climbers', sets: 4, reps: '20 per ben', rest: 20, desc: 'Raskt tempo, hofter nede' },
      { name: 'High knees', sets: 4, reps: '30 sek', rest: 15, desc: 'Knærne opp til hoften' },
      { name: 'Squat jumps', sets: 3, reps: '15', rest: 30, desc: 'Eksplosivt, land mykt' },
    ]
  },
  {
    id: 'core-abs',
    name: 'Mage og kjerne',
    level: 'Middels',
    duration: '20 min',
    category: 'Kjerne',
    exercises: [
      { name: 'Crunches', sets: 3, reps: '20', rest: 30, desc: 'Sakte opp, kontrollert ned' },
      { name: 'Bicycle crunches', sets: 3, reps: '16 per side', rest: 30, desc: 'Roter kroppen, albue mot kne' },
      { name: 'Leg raises', sets: 3, reps: '15', rest: 45, desc: 'Rette ben, sakte ned' },
      { name: 'Planke', sets: 3, reps: '30 sek', rest: 30, desc: 'Rett linje fra hode til hæl' },
      { name: 'Side planke', sets: 3, reps: '20 sek per side', rest: 30, desc: 'Hofter oppe, rett linje' },
      { name: 'Russian twists', sets: 3, reps: '20 totalt', rest: 30, desc: 'Lene bakover, roter side til side' },
    ]
  },
  {
    id: 'morning-mobility',
    name: 'Morgenrørslighet',
    level: 'Nybegynner',
    duration: '15 min',
    category: 'Mobilitet',
    exercises: [
      { name: 'Cat-cow strekk', sets: 2, reps: '10', rest: 15, desc: 'På alle fire, bøy og hvelv ryggen' },
      { name: 'Hofterotasjon', sets: 2, reps: '10 per side', rest: 15, desc: 'Stå på ett ben, roter hoften utover' },
      { name: 'Skulder åpning', sets: 2, reps: '10', rest: 15, desc: 'Armer ut til siden, roter bakover' },
      { name: 'Verdens beste strekk', sets: 2, reps: '5 per side', rest: 20, desc: 'Utfall med rotasjon og strekk' },
      { name: 'Pigeon pose', sets: 2, reps: '30 sek per side', rest: 15, desc: 'Hold posisjonen, pust rolig' },
    ]
  },
];

const LEVEL_BADGE = { 'Nybegynner': 'badge-green', 'Middels': 'badge-blue', 'Hard': 'badge-orange' };

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  screen: 'home',   // home | session | log
  tab: 'workouts',  // workouts | custom | log
  activeWorkout: null,
  checks: {},       // exIdx -> [bool]
  sessionStart: null,
  log: JSON.parse(localStorage.getItem('hw_log') || '[]'),
};

let restTimer = null;
let restRemaining = 0;

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'session') {
    app.innerHTML = renderSession();
  } else {
    app.innerHTML = renderHome();
  }
}

function renderHome() {
  const tabs = [
    { id: 'workouts', label: 'Treninger' },
    { id: 'log', label: 'Logg' },
  ];

  let content = '';
  if (state.tab === 'workouts') content = renderWorkoutList();
  else content = renderLog();

  return `
    <div style="margin-bottom:20px">
      <h1>🏠 Hjemmetrening</h1>
      <p class="subtitle">Tren uten utstyr – når som helst</p>
    </div>
    <div class="nav">
      ${tabs.map(t => `<button class="nav-btn ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
    ${content}
  `;
}

function renderWorkoutList() {
  return WORKOUTS.map(w => `
    <div class="workout-card" onclick="startWorkout('${w.id}')">
      <div class="row">
        <h3>${w.name}</h3>
        <span class="badge ${LEVEL_BADGE[w.level]||'badge'}">${w.level}</span>
      </div>
      <div class="workout-meta">
        <span class="badge">⏱ ${w.duration}</span>
        <span class="badge">🏷 ${w.category}</span>
        <span class="badge">💪 ${w.exercises.length} øvelser</span>
      </div>
    </div>
  `).join('');
}

function renderLog() {
  if (state.log.length === 0) return `
    <div class="empty-state">
      <div class="icon">📓</div>
      Ingen fullførte økter ennå.<br>Start en trening for å se loggen din!
    </div>`;

  return [...state.log].reverse().map((entry, i) => `
    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <div>
          <h3>${entry.workoutName}</h3>
          <div class="tag">${entry.date}</div>
        </div>
        <div style="text-align:right">
          <div style="color:#22c55e;font-weight:700">${entry.pct}%</div>
          <div class="tag">${entry.duration} min</div>
        </div>
      </div>
      ${entry.exercises.map(ex => `
        <div class="log-item">
          <div class="row">
            <span style="font-size:0.88rem">${ex.name}</span>
            <span class="tag">${ex.done}/${ex.total} sett × ${ex.reps}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderSession() {
  const w = state.activeWorkout;
  const totalSets = w.exercises.reduce((s, ex) => s + ex.sets, 0);
  const doneSets = Object.values(state.checks).flat().filter(Boolean).length;
  const pct = totalSets ? Math.round((doneSets / totalSets) * 100) : 0;

  const elapsed = Math.round((Date.now() - state.sessionStart) / 60000);

  return `
    <div class="top-bar">
      <button class="back-btn" onclick="cancelSession()">← Avbryt</button>
      <div>
        <h2 style="margin:0">${w.name}</h2>
        <span class="tag">${elapsed} min · ${pct}% ferdig</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="row">
        <span style="font-size:0.85rem;color:#94a3b8">Fremgang</span>
        <span style="font-weight:700;color:#22c55e">${doneSets}/${totalSets} sett</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    ${w.exercises.map((ex, i) => {
      const checks = state.checks[i] || [];
      const allDone = checks.every(Boolean);
      return `
        <div class="session-card ${allDone ? 'completed-ex' : ''}">
          <div class="row" style="margin-bottom:4px">
            <h3>${allDone ? '✅ ' : ''}${ex.name}</h3>
            <span class="tag">${ex.reps} reps</span>
          </div>
          <div class="tag" style="margin-bottom:8px;font-size:0.78rem">${ex.desc}</div>
          <div class="set-row">
            ${checks.map((done, s) => `
              <button class="set-btn ${done ? 'done' : ''}" onclick="toggleSet(${i},${s})" title="Sett ${s+1}">
                ${done ? '✓' : s+1}
              </button>
            `).join('')}
          </div>
          <div class="tag" style="margin-top:8px;font-size:0.78rem">Hvil: ${ex.rest} sek</div>
        </div>
      `;
    }).join('')}

    <button class="btn btn-success btn-full" onclick="finishSession()" style="margin-top:8px">
      Fullfør økt (${doneSets}/${totalSets} sett)
    </button>
  `;
}

// ── Actions ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  render();
}

function startWorkout(id) {
  const w = WORKOUTS.find(x => x.id === id);
  state.activeWorkout = w;
  state.checks = Object.fromEntries(w.exercises.map((ex, i) => [i, Array(ex.sets).fill(false)]));
  state.sessionStart = Date.now();
  state.screen = 'session';
  render();
}

function toggleSet(exIdx, setIdx) {
  const wasUnchecked = !state.checks[exIdx][setIdx];
  state.checks[exIdx][setIdx] = !state.checks[exIdx][setIdx];

  if (wasUnchecked) {
    // Show rest timer
    const ex = state.activeWorkout.exercises[exIdx];
    const nextEx = state.activeWorkout.exercises[exIdx + 1];
    const nextName = nextEx ? nextEx.name : 'Ferdig!';
    startRestTimer(ex.rest, nextName);
  }

  render();
}

function cancelSession() {
  stopRestTimer();
  state.screen = 'home';
  state.activeWorkout = null;
  render();
}

function finishSession() {
  stopRestTimer();
  const w = state.activeWorkout;
  const totalSets = w.exercises.reduce((s, ex) => s + ex.sets, 0);
  const doneSets = Object.values(state.checks).flat().filter(Boolean).length;
  const pct = totalSets ? Math.round((doneSets / totalSets) * 100) : 0;
  const duration = Math.max(1, Math.round((Date.now() - state.sessionStart) / 60000));

  const entry = {
    workoutName: w.name,
    date: new Date().toLocaleDateString('no-NO', { day: '2-digit', month: 'short', year: 'numeric' }),
    pct,
    duration,
    exercises: w.exercises.map((ex, i) => ({
      name: ex.name,
      reps: ex.reps,
      done: (state.checks[i] || []).filter(Boolean).length,
      total: ex.sets,
    }))
  };

  state.log.push(entry);
  localStorage.setItem('hw_log', JSON.stringify(state.log));

  state.screen = 'home';
  state.tab = 'log';
  state.activeWorkout = null;
  render();

  // Show summary
  setTimeout(() => alert(`Bra jobba! 💪\n${pct}% fullført · ${duration} min`), 100);
}

// ── Rest Timer ─────────────────────────────────────────────────────────────────
function startRestTimer(seconds, nextName) {
  stopRestTimer();
  restRemaining = seconds;
  document.getElementById('rest-next').textContent = nextName;
  updateRestDisplay();
  document.getElementById('rest-overlay').classList.add('show');

  restTimer = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      stopRestTimer();
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    } else {
      updateRestDisplay();
    }
  }, 1000);
}

function updateRestDisplay() {
  document.getElementById('rest-time-display').textContent = restRemaining;
}

function stopRestTimer() {
  if (restTimer) { clearInterval(restTimer); restTimer = null; }
  const overlay = document.getElementById('rest-overlay');
  if (overlay) overlay.classList.remove('show');
}

function skipRest() {
  stopRestTimer();
}

// ── Init ───────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
