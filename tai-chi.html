<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tai Chi Treningsapp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #333;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #4a5568;
    margin-bottom: 8px;
    font-size: 2em;
  }
  .subtitle {
    text-align: center;
    color: #718096;
    margin-bottom: 24px;
  }
  .progress {
    background: #e2e8f0;
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-bar {
    background: linear-gradient(90deg, #667eea, #764ba2);
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }
  .exercise {
    text-align: center;
  }
  .exercise-number {
    color: #764ba2;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .exercise-name {
    font-size: 1.8em;
    color: #2d3748;
    margin-bottom: 12px;
  }
  .exercise-chinese {
    color: #718096;
    font-style: italic;
    margin-bottom: 20px;
  }
  .illustration {
    background: linear-gradient(135deg, #f0f4ff, #faf0ff);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .illustration svg {
    width: 220px;
    height: 220px;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
  }
  .exercise-description {
    background: #f7fafc;
    padding: 18px;
    border-radius: 12px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: #4a5568;
    text-align: left;
  }
  .timer {
    font-size: 3.5em;
    font-weight: 300;
    color: #4a5568;
    margin: 16px 0;
  }
  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 1em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-weight: 500;
  }
  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button.secondary {
    background: #e2e8f0;
    color: #4a5568;
  }
  .complete {
    text-align: center;
    padding: 20px;
  }
  .complete h2 {
    color: #48bb78;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Tai Chi</h1>
    <p class="subtitle">En rolig øktøkt med 6 øvelser</p>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="content"></div>
  </div>

      <circle cx="62" cy="115" r="5" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <circle cx="90" cy="48" r="15" fill="#fde68a" stroke="#92400e" stroke-width="1.5"/>
      <ellipse cx="90" cy="32" rx="9" ry="6" fill="#1a202c"/>
      <circle cx="85" cy="47" r="1.3" fill="#1a202c"/>
      <circle cx="95" cy="47" r="1.3" fill="#1a202c"/>

    </svg>`,
    brushknee: `<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">

      <rect x="68" y="104" width="48" height="6" fill="#fbbf24"/>
      <path d="M112 65 Q130 62 148 62 L148 72 Q130 76 108 76 Z" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>

      <ellipse cx="90" cy="32" rx="9" ry="6" fill="#1a202c"/>
      <circle cx="85" cy="47" r="1.3" fill="#1a202c"/>
      <circle cx="95" cy="47" r="1.3" fill="#1a202c"/>
      <path d="M85 54 Q90 57 95 54" stroke="#92400e" stroke-width="1.3" fill="none"/>
    </svg>`,
    pipa: `<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
      <circle cx="90" cy="75" r="62" fill="#fef3c7" opacity="0.7"/>
      <path d="M130 35 Q145 30 145 42" stroke="#a78bfa" stroke-width="2" fill="none" stroke-dasharray="3,3" opacity="0.8"/>
      <ellipse cx="130" cy="55" rx="10" ry="12" fill="#fbbf24" stroke="#b45309" stroke-width="1.5" opacity="0.5"/>
      <line x1="130" y1="45" x2="130" y2="35" stroke="#b45309" stroke-width="2"/>
      <path d="M78 165 L82 118 L92 118 L88 165 Z" fill="#1e40af"/>
      <path d="M108 165 L106 122 L96 122 L100 165 Z" fill="#1e40af" opacity="0.7"/>
      <path d="M70 65 Q58 105 68 140 L112 140 Q122 105 112 65 Z" fill="#0891b2" stroke="#155e75" stroke-width="1.5"/>
      <rect x="68" y="104" width="48" height="6" fill="#b45309"/>
      <path d="M112 68 Q130 60 138 52 L132 45 Q115 52 108 62 Z" fill="#0891b2" stroke="#155e75" stroke-width="1.5"/>
      <path d="M108 75 Q120 85 125 78 L118 68 Q110 70 104 72 Z" fill="#0891b2" stroke="#155e75" stroke-width="1.5"/>
      <circle cx="134" cy="48" r="5" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <circle cx="122" cy="78" r="5" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <circle cx="90" cy="48" r="15" fill="#fde68a" stroke="#92400e" stroke-width="1.5"/>
      <ellipse cx="90" cy="32" rx="9" ry="6" fill="#1a202c"/>
      <circle cx="85" cy="47" r="1.3" fill="#1a202c"/>
      <circle cx="95" cy="47" r="1.3" fill="#1a202c"/>
      <path d="M85 54 Q90 57 95 54" stroke="#92400e" stroke-width="1.3" fill="none"/>
    </svg>`,
    closing: `<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
      <circle cx="90" cy="75" r="62" fill="#f3e8ff" opacity="0.7"/>
      <g transform="translate(90,75)" opacity="0.25">
        <circle r="40" fill="#fff" stroke="#1a202c" stroke-width="1.5"/>
        <path d="M0 -40 A40 40 0 0 1 0 40 A20 20 0 0 0 0 0 A20 20 0 0 1 0 -40 Z" fill="#1a202c"/>
        <circle cx="0" cy="-20" r="4" fill="#1a202c"/>
        <circle cx="0" cy="20" r="4" fill="#fff"/>
      </g>
      <path d="M78 165 L80 115 L90 115 L88 165 Z" fill="#1e40af"/>
      <path d="M102 165 L100 115 L90 115 L92 165 Z" fill="#1e40af"/>
      <path d="M70 65 Q58 108 66 138 L114 138 Q122 108 110 65 Z" fill="#db2777" stroke="#831843" stroke-width="1.5"/>
      <rect x="66" y="104" width="48" height="6" fill="#fbbf24"/>
      <path d="M70 65 Q62 90 64 120 L74 120 Q74 92 78 72 Z" fill="#db2777" stroke="#831843" stroke-width="1.5"/>
      <path d="M110 65 Q118 90 116 120 L106 120 Q106 92 102 72 Z" fill="#db2777" stroke="#831843" stroke-width="1.5"/>
      <circle cx="69" cy="122" r="5" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <circle cx="111" cy="122" r="5" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
      <circle cx="90" cy="48" r="15" fill="#fde68a" stroke="#92400e" stroke-width="1.5"/>
      <ellipse cx="90" cy="32" rx="9" ry="6" fill="#1a202c"/>

      <path d="M85 54 Q90 57 95 54" stroke="#92400e" stroke-width="1.3" fill="none"/>
    </svg>`
  };

  const exercises = [
    {
      name: "Åpne Tai Chi",
      chinese: "起势 - Qǐ shì",
      description: "Stå med føttene i skulderbredde. Pust rolig inn mens du hever armene sakte opp til skulderhøyde, håndflatene ned. Pust ut og senk armene.",
      duration: 60,
      svg: illustrations.qishi
    },
    {
      name: "Del den ville hestens manke",
      chinese: "野马分鬃 - Yě mǎ fēn zōng",
      description: "Flytt vekten til høyre ben, løft venstre ben og plasser det foran. Beveg armene som om du skiller en manke – en hånd opp, en ned. Gjenta på begge sider.",
      duration: 90,
      svg: illustrations.horsemane
    },
    {
      name: "Tranen brer sine vinger",
      chinese: "白鹤亮翅 - Bái hè liàng chì",
      description: "Stå med vekten på bakre ben. Løft høyre hånd opp over hodet mens venstre hånd senkes ned ved hoften. Hold blikket rolig fremover.",
      duration: 75,
      svg: illustrations.crane
    },
    {
      name: "Børst knær",
      chinese: "搂膝拗步 - Lǒu xī ǎo bù",
      description: "Tråkk frem med ett ben. Før den ene hånden forbi kneet i en bueformet bevegelse, mens den andre hånden skyves fremover i brysthøyde.",
      duration: 90,
      svg: illustrations.brushknee
    },
    {
      name: "Spill pipa",
      chinese: "手挥琵琶 - Shǒu huī pípá",
      description: "Stå med vekten bak, fremre hæl lett hvilende. Løft armene som om du holder en pipa-lutt – høyre hånd foran, venstre i albuehøyde. Hold posisjonen og pust.",
      duration: 60,
      svg: illustrations.pipa
    },
    {
      name: "Avslutning",
      chinese: "收势 - Shōu shì",
      description: "Samle vekten jevnt på begge ben. Senk armene rolig ned langs sidene. Stå stille et øyeblikk, kjenn pusten og roen.",
      duration: 60,
      svg: illustrations.closing
    }
  ];

  let currentIndex = 0;
  let timeLeft = 0;
  let timerId = null;
  let isRunning = false;

  const content = document.getElementById('content');
  const progressBar = document.getElementById('progressBar');

  function render() {
    if (currentIndex >= exercises.length) {
      content.innerHTML = `
        <div class="complete">
          <h2>Godt gjort!</h2>
          <p style="margin-bottom: 20px; color: #4a5568;">Du har fullført alle 6 tai chi-øvelsene.</p>
          <button onclick="restart()">Start på nytt</button>
        </div>
      `;
      progressBar.style.width = '100%';
      return;
    }

    const ex = exercises[currentIndex];
    if (timeLeft === 0) timeLeft = ex.duration;

    content.innerHTML = `
      <div class="exercise">
        <div class="exercise-number">ØVELSE ${currentIndex + 1} AV ${exercises.length}</div>
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-chinese">${ex.chinese}</div>
        <div class="illustration">${ex.svg}</div>
        <div class="exercise-description">${ex.description}</div>
        <div class="timer" id="timer">${formatTime(timeLeft)}</div>
        <div class="buttons">
          <button id="toggleBtn" onclick="toggle()">${isRunning ? 'Pause' : 'Start'}</button>
          <button class="secondary" onclick="next()">${currentIndex === exercises.length - 1 ? 'Fullfør' : 'Neste'}</button>
        </div>
      </div>
    `;

    const progress = (currentIndex / exercises.length) * 100;
    progressBar.style.width = progress + '%';
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function toggle() {
    if (isRunning) {
      clearInterval(timerId);
      isRunning = false;
      document.getElementById('toggleBtn').textContent = 'Start';
    } else {
      isRunning = true;
      document.getElementById('toggleBtn').textContent = 'Pause';
      timerId = setInterval(() => {
        timeLeft--;
        const timerEl = document.getElementById('timer');
        if (timerEl) timerEl.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(timerId);
          isRunning = false;
          next();
        }
      }, 1000);
    }
  }

  function next() {
    clearInterval(timerId);
    isRunning = false;
    currentIndex++;
    timeLeft = 0;
    render();
  }

  function restart() {
    currentIndex = 0;
    timeLeft = 0;
    isRunning = false;
    clearInterval(timerId);
    render();
  }

  render();
</script>
</body>
</html>
