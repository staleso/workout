<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tai Chi + Styrke</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: none; }
  html { width: 393px; overflow-x: hidden; }

  /* ── THEME VARIABLES ── */
  body {
    --bg:       #0a0a0a;
    --bg2:      #111;
    --bg3:      #161616;
    --bg4:      #1a1a1a;
    --bg5:      #141414;
    --border:   #222;
    --border2:  #2a2a2a;
    --border3:  #333;
    --text:     #e5e5e5;
    --text2:    #a3a3a3;
    --text3:    #737373;
    --text4:    #525252;
    --text5:    #444;
    --accent:   #b91c1c;
    --accent2:  #dc2626;
    --tl-idle:  #222;
    --tl-done:  #1a1a1a;
    --tl-done-c:#3a3a3a;
    --cal-day:  #161616;
    --cal-done: #111;
    --cal-done-c:#2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    color: var(--text);
    width: 393px;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    transition: background 0.2s, color 0.2s;
  }
  body.light {
    --bg:       #f2f2f7;
    --bg2:      #ffffff;
    --bg3:      #ffffff;
    --bg4:      #f2f2f7;
    --bg5:      #ffffff;
    --border:   #e0e0e0;
    --border2:  #d0d0d0;
    --border3:  #c8c8c8;
    --text:     #1a1a1a;
    --text2:    #444;
    --text3:    #666;
    --text4:    #888;
    --text5:    #aaa;
    --accent:   #b91c1c;
    --accent2:  #dc2626;
    --tl-idle:  #e0e0e0;
    --tl-done:  #d0d0d0;
    --tl-done-c:#aaa;
    --cal-day:  #ffffff;
    --cal-done: #e8e8e8;
    --cal-done-c:#bbb;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
  h1 { font-size: 1.1em; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
  .header-timer { font-family: "SF Mono", "Fira Code", monospace; font-size: 1.4em; font-weight: 800; color: var(--text); letter-spacing: 1px; }
  .back-btn {
    background: none; border: none; color: var(--text3); font-size: 0.85em;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; padding: 4px 0; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn {
    background: none; border: none; font-size: 1.2em; cursor: pointer;
    padding: 4px; flex-shrink: 0; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── TIMELINE ── */
  .timeline-wrap { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
  .timeline-wrap::-webkit-scrollbar { display: none; }
  .timeline { display: flex; align-items: center; min-width: max-content; padding: 0 2px; }
  .tl-item { display: flex; align-items: center; cursor: pointer; }
  .tl-dot {
    width: 28px; height: 28px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6em; font-weight: 800; transition: all 0.2s;
    background: var(--tl-idle); color: var(--text4); border: 1px solid var(--border2);
  }
  .tl-dot.done { background: var(--tl-done); color: var(--tl-done-c); border-color: var(--border); }
  .tl-dot.done::after { content: '✓'; font-size: 1.1em; }
  .tl-dot.active { background: var(--accent); color: #fff; border-color: var(--accent2); box-shadow: 0 0 8px #b91c1c88; }
  .tl-dot.warmup-dot   { border-left: 2px solid #1d4ed8; }
  .tl-dot.strength-dot { border-left: 2px solid #dc2626; }
  .tl-dot.flow-dot     { border-left: 2px solid #16a34a; }
  .tl-dot.cooldown-dot { border-left: 2px solid #6b7280; }
  .tl-line { width: 6px; height: 2px; background: var(--tl-idle); flex-shrink: 0; }
  .tl-line.done { background: var(--tl-done); }

  /* ── CALENDAR ── */
  .cal-wrap { padding: 14px; }
  .cal-month { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month h2 { font-size: 1em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text); }
  .cal-nav {
    background: var(--bg4); border: 1px solid var(--border3); color: var(--text2);
    width: 32px; height: 32px; border-radius: 2px; cursor: pointer;
    font-size: 1em; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-nav:active { background: var(--border); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow {
    text-align: center; font-size: 0.6em; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: var(--text5); padding: 4px 0;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 3px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    background: var(--cal-day); border: 1px solid var(--border);
    -webkit-tap-highlight-color: transparent; position: relative; transition: background 0.15s;
  }
  .cal-day:active { background: var(--border2); }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.today .cal-day-num { color: #f87171; }
  .cal-day.done { background: var(--cal-done); border-color: var(--cal-done); cursor: default; }
  .cal-day.done .cal-day-num { color: var(--cal-done-c); }
  .cal-day.done::after { content: '✓'; position: absolute; font-size: 0.75em; color: var(--cal-done-c); font-weight: 800; }
  .cal-day.future { opacity: 0.35; cursor: default; }
  .cal-day-num { font-size: 0.85em; font-weight: 700; color: var(--text2); line-height: 1; }
  .cal-legend { display: flex; gap: 14px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7em; color: var(--text4); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 1px; }

  /* ── MAIN ── */
  .main { padding: 12px 14px 24px; }
  .section-badge {
    display: inline-block; padding: 3px 10px; border-radius: 2px;
    font-size: 0.65em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .section-badge.warmup   { background: #1e3a5f; color: #93c5fd; }
  .section-badge.strength { background: #7f1d1d; color: #fca5a5; }
  .section-badge.flow     { background: #14532d; color: #86efac; }
  .section-badge.cooldown { background: #374151; color: #d1d5db; }
  .exercise-number { color: var(--text4); font-weight: 700; letter-spacing: 3px; font-size: 0.7em; margin-bottom: 4px; }
  .exercise-name { font-size: 1.35em; color: var(--text); font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
  .exercise-sub { color: var(--text3); font-size: 0.8em; letter-spacing: 0.5px; margin-bottom: 8px; }
  .exercise-tip {
    display: inline-block; background: var(--bg4); border: 1px solid var(--border3);
    color: #f59e0b; padding: 4px 10px; border-radius: 2px; font-size: 0.75em; margin-bottom: 10px; font-weight: 600;
  }
  .illustration { background: var(--bg5); border-radius: 4px; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
  .pose-pair { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .pose-frame { text-align: center; flex: 1; }
  .pose-label { font-size: 0.6em; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--text5); margin-bottom: 2px; }
  .pose-arrow { font-size: 1.4em; color: var(--accent); font-weight: 700; flex-shrink: 0; }
  .pose-frame svg { width: 100%; height: auto; max-width: 120px; display: block; margin: 0 auto; }
  .tc-fig { --robe:#374151;--dark:#1f2937;--pants:#111827;--belt:#b91c1c;--skin:#d4a574;--skin-d:#8b6914;--hair:#111;--halo:#1a1a1a; }
  .tc-fig.horsemane  { --robe:#1a4731;--dark:#0f3422;--belt:#b45309; }
  .tc-fig.wavehands  { --robe:#1e3a5f;--dark:#172554;--belt:#1d4ed8; }
  .tc-fig.pushups    { --robe:#7f1d1d;--dark:#450a0a;--belt:#111827; }
  .tc-fig.plank      { --robe:#374151;--dark:#1f2937;--belt:#111827; }
  .tc-fig.rowing     { --robe:#1e1b4b;--dark:#0f0b3e;--belt:#111827; }
  .tc-fig.singlewhip { --robe:#14532d;--dark:#052e16;--belt:#b45309; }
  .tc-fig.brushknee  { --robe:#7f1d1d;--dark:#450a0a;--belt:#f59e0b; }
  .tc-fig.graspbird  { --robe:#312e81;--dark:#1e1b4b;--belt:#f59e0b; }
  .tc-fig.repulse    { --robe:#78350f;--dark:#451a03;--belt:#dc2626; }
  .tc-fig.closing    { --robe:#334155;--dark:#1e293b;--belt:#f59e0b; }
  .ex-progress { background: var(--bg4); height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .ex-progress-bar { background: linear-gradient(90deg, #b91c1c, #f59e0b); height: 100%; transition: width 1s linear; }
  .exercise-description {
    background: var(--bg5); padding: 10px 12px; border-radius: 4px;
    line-height: 1.55; margin-bottom: 10px; color: var(--text3); text-align: left; font-size: 0.82em; border: 1px solid var(--border);
  }
  .buttons { display: flex; gap: 8px; }
  button {
    flex: 1; background: var(--accent); color: #fff; border: none;
    padding: 14px 10px; border-radius: 2px; font-size: 0.9em; cursor: pointer;
    font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: var(--accent2); }
  button.secondary { background: var(--bg4); color: var(--text3); border: 1px solid var(--border3); flex: 0.6; }
  button.secondary:active { background: var(--border); }
  .complete { text-align: center; padding: 40px 20px; }
  .complete h2 { color: #f59e0b; margin-bottom: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; font-size: 1.4em; }
  .complete p { color: var(--text4); margin-bottom: 28px; font-size: 0.9em; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-top">
    <button class="back-btn" id="backBtn" onclick="goCalendar()" style="display:none">← Kalender</button>
    <h1 id="headerTitle">Tai Chi + Styrke</h1>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="header-timer" id="headerTimer" style="display:none">0:00</div>
      <button class="mode-btn" id="modeBtn" onclick="toggleMode()">☀️</button>
    </div>
  </div>
  <div class="timeline-wrap" id="timelineWrap" style="display:none">
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<div id="app"></div>

<script>
// ── THEME ──
function toggleMode() {
  const light = document.body.classList.toggle('light');
  localStorage.setItem('taichi_theme', light ? 'light' : 'dark');
  document.getElementById('modeBtn').textContent = light ? '🌙' : '☀️';
}
(function initTheme() {
  const saved = localStorage.getItem('taichi_theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('modeBtn').textContent = '🌙';
  }
})();

// ── STORAGE ──
const STORE_KEY = 'taichi_done';
function loadDone() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveDay(dateStr) {
  const d = loadDone(); d[dateStr] = true;
  localStorage.setItem(STORE_KEY, JSON.stringify(d));
}
function isDone(dateStr) { return !!loadDone()[dateStr]; }
function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

// ── CALENDAR ──
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const DAYS_NO = ['Ma','Ti','On','To','Fr','Lø','Sø'];
let calYear, calMonth;

function initCal() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

function renderCalendar() {
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTimer').style.display = 'none';
  document.getElementById('timelineWrap').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'Tai Chi + Styrke';

  const now = new Date();
  const today = { y: now.getFullYear(), m: now.getMonth(), d: now.getDate() };
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  // Convert Sunday=0 to Monday=0
  const startOffset = (firstDay + 6) % 7;

  const dowHtml = DAYS_NO.map(d => `<div class="cal-dow">${d}</div>`).join('');
  const emptyHtml = Array(startOffset).fill('<div class="cal-day empty"></div>').join('');

  const daysHtml = Array.from({length: daysInMonth}, (_, i) => {
    const day = i + 1;
    const key = dateKey(calYear, calMonth, day);
    const isToday = calYear===today.y && calMonth===today.m && day===today.d;
    const isFuture = new Date(calYear, calMonth, day) > new Date(today.y, today.m, today.d);
    const done = isDone(key);
    let cls = 'cal-day';
    if (done) cls += ' done';
    else if (isToday) cls += ' today';
    else if (isFuture) cls += ' future';
    const onclick = (!done && !isFuture) ? `onclick="startWorkout('${key}')"` : '';
    return `<div class="${cls}" ${onclick}><span class="cal-day-num">${day}</span></div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="cal-wrap">
      <div class="cal-month">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <h2>${MONTHS_NO[calMonth]} ${calYear}</h2>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">
        ${dowHtml}${emptyHtml}${daysHtml}
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#b91c1c;border:1px solid #dc2626"></div> I dag</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#111;border:1px solid #1a1a1a"></div> Fullf&oslash;rt</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#161616;border:1px solid #333"></div> Tilgjengelig</div>
      </div>
    </div>`;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

// ── WORKOUT ──
function sfig(cls, a, id) {
  const r = (ang,px,py) => `transform="rotate(${ang} ${px} ${py})"`;
  return `<svg class="tc-fig ${cls}" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="h${id}" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="var(--halo)" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="var(--halo)" stop-opacity="0"/>
    </radialGradient></defs>
    <circle cx="100" cy="100" r="80" fill="url(#h${id})"/>
    <ellipse cx="100" cy="185" rx="28" ry="3.5" fill="#000" opacity="0.3"/>
    <g transform="translate(${a.sx||0},0)">
      <path d="M92 120 L89 180" stroke="var(--pants)" stroke-width="12" stroke-linecap="round" fill="none"/>
      <path d="M108 120 L111 180" stroke="var(--pants)" stroke-width="12" stroke-linecap="round" fill="none"/>
      <path d="M80 66 Q72 96 84 128 L116 128 Q128 96 120 66 Z" fill="var(--robe)" stroke="var(--dark)" stroke-width="1.5"/>
      <path d="M100 66 Q97 98 100 128" stroke="var(--dark)" stroke-width="1" fill="none" opacity="0.3"/>
      <rect x="82" y="105" width="36" height="5" fill="var(--belt)" rx="1"/>
      <g ${r(a.aL,85,68)}>
        <path d="M85 68 L85 100" stroke="var(--robe)" stroke-width="12" stroke-linecap="round" fill="none"/>
        <g ${r(a.fL,85,100)}>
          <path d="M85 100 L85 130" stroke="var(--robe)" stroke-width="10" stroke-linecap="round" fill="none"/>
          <circle cx="85" cy="134" r="6" fill="var(--skin)" stroke="var(--skin-d)" stroke-width="1"/>
        </g>
      </g>
      <g ${r(a.aR,115,68)}>
        <path d="M115 68 L115 100" stroke="var(--robe)" stroke-width="12" stroke-linecap="round" fill="none"/>
        <g ${r(a.fR,115,100)}>
          <path d="M115 100 L115 130" stroke="var(--robe)" stroke-width="10" stroke-linecap="round" fill="none"/>
          <circle cx="115" cy="134" r="6" fill="var(--skin)" stroke="var(--skin-d)" stroke-width="1"/>
        </g>
      </g>
      <g>
        <circle cx="100" cy="45" r="16" fill="var(--skin)" stroke="var(--skin-d)" stroke-width="1.5"/>
        <rect x="88" y="26" width="24" height="10" rx="4" fill="var(--hair)"/>
        <circle cx="94" cy="44" r="1.5" fill="var(--hair)"/>
        <circle cx="106" cy="44" r="1.5" fill="var(--hair)"/>
        <line x1="94" y1="54" x2="106" y2="54" stroke="var(--skin-d)" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
  </svg>`;
}

function pair(cls, from, to, idx) {
  return `<div class="pose-pair">
    <div class="pose-frame"><div class="pose-label">Fra</div>${sfig(cls, from, idx+'a')}</div>
    <div class="pose-arrow">›</div>
    <div class="pose-frame"><div class="pose-label">Til</div>${sfig(cls, to, idx+'b')}</div>
  </div>`;
}

const sectionOf = i => {
  if (i <= 2) return 'warmup';
  if (i <= 6) return 'strength';
  if (i <= 9) return 'flow';
  return 'cooldown';
};

const exercises = [
  { section:'warmup', sectionName:'Oppvarming', sectionTime:'5 min',
    name:'Åpne Tai Chi', sub:'起势 · Qǐ shì',
    desc:'Stå med føttene i skulderbredde. Pust rolig inn mens du hever armene sakte opp til skulderhøyde, håndflatene ned. Pust ut og senk armene.',
    tip:'Aktiver kjerne, ledd og pust', duration:60, cls:'qishi',
    from:{aL:0,fL:0,aR:0,fR:0}, to:{aL:85,fL:-5,aR:-85,fR:5} },
  { name:'Del den ville hestens manke', sub:'野马分鬃 · Yě mǎ fēn zōng',
    desc:'Flytt vekten til høyre ben, løft venstre ben og plasser det foran. Beveg armene som om du skiller en manke – en hånd opp, en ned. Gjenta på begge sider.',
    duration:120, cls:'horsemane',
    from:{aL:120,fL:-20,aR:30,fR:-25,sx:4}, to:{aL:-30,fL:25,aR:-120,fR:20,sx:-4} },
  { name:'Skyv skyene', sub:'云手 · Yún shǒu',
    desc:'Stå med føttene parallelt. Før armene foran kroppen i store, myke sirkler – som om du skyver skyer til siden. La overkroppen følge med rolig.',
    duration:120, cls:'wavehands',
    from:{aL:50,fL:30,aR:-50,fR:-30,sx:6}, to:{aL:-50,fL:-30,aR:50,fR:30,sx:-6} },
  { section:'strength', sectionName:'Styrke', sectionTime:'10–12 min · 2–3 runder',
    name:'Push-ups', sub:'Armhevinger',
    desc:'Hold kroppen strak fra hode til hæl. Senk brystet mot gulvet, press deg opp. 8–15 repetisjoner.',
    tip:'Lettere: på knær · Tyngre: 3 sek ned', duration:60, cls:'pushups',
    from:{aL:85,fL:0,aR:-85,fR:0}, to:{aL:40,fL:-40,aR:-40,fR:40} },
  { name:'Planke', sub:'Kjernehold',
    desc:'Hold kroppen strak i push-up-posisjon med strake armer. Stram mage og sete. Ikke la korsryggen falle.',
    tip:'Hold 30–45 sekunder', duration:45, cls:'plank',
    from:{aL:82,fL:0,aR:-82,fR:0}, to:{aL:85,fL:0,aR:-85,fR:0} },
  { name:'Roing', sub:'Albue-trekk',
    desc:'Stå med lett bøyde knær. Trekk albuene bakover som om du ror – stram mellom skulderbladene. 10–15 repetisjoner.',
    tip:'Bra for armer og rygg', duration:60, cls:'rowing',
    from:{aL:50,fL:20,aR:-50,fR:-20,sx:2}, to:{aL:-25,fL:-50,aR:25,fR:50,sx:-2} },
  { name:'Enkeltpisk-hold', sub:'单鞭 · Dān biān',
    desc:'Strekk en arm ut til siden med "krok-hånd", den andre skyver fremover. Hold stillingen isometrisk 20–30 sekunder per side.',
    tip:'Isometrisk styrke i armer og skuldre', duration:60, cls:'singlewhip',
    from:{aL:0,fL:0,aR:0,fR:0}, to:{aL:90,fL:0,aR:-100,fR:-40,sx:-2} },
  { section:'flow', sectionName:'Styrkeflyt', sectionTime:'5–6 min · ekstra spenning',
    name:'Børst knær og skyv', sub:'搂膝拗步 · Lǒu xī ǎo bù',
    desc:'Tråkk frem med ett ben. Før den ene hånden forbi kneet, mens den andre skyves fremover i brysthøyde. Utfør sakte med bevisst muskelspenning.',
    tip:'Hold 10–20% muskelspenning hele tiden', duration:120, cls:'brushknee',
    from:{aL:-55,fL:25,aR:75,fR:-10,sx:-3}, to:{aL:-95,fL:50,aR:90,fR:5,sx:3} },
  { name:'Grip fuglens hale', sub:'揽雀尾 · Lǎn què wěi',
    desc:'Fire bevegelser i ett: avverge, rulle tilbake, presse, skyve. Flyt gjennom sekvensen med ekstra kraft i hver posisjon.',
    duration:120, cls:'graspbird',
    from:{aL:60,fL:20,aR:-60,fR:-20}, to:{aL:80,fL:0,aR:-80,fR:-5,sx:2} },
  { name:'Jag apen tilbake', sub:'倒卷肱 · Dào juǎn gōng',
    desc:'Gå bakover med kontrollerte skritt. En arm skyver fremover mens den andre trekkes tilbake. Bytt side for hvert skritt.',
    duration:120, cls:'repulse',
    from:{aL:100,fL:-20,aR:-30,fR:20,sx:-3}, to:{aL:-30,fL:20,aR:100,fR:-20,sx:3} },
  { section:'cooldown', sectionName:'Nedtrapping', sectionTime:'3–4 min',
    name:'Åpne Tai Chi', sub:'起势 · Qǐ shì',
    desc:'Gjenta åpningsbevegelsen. Senk tempoet enda mer. Kjenn hvordan kroppen føles etter økten.',
    duration:60, cls:'qishi',
    from:{aL:85,fL:-5,aR:-85,fR:5}, to:{aL:0,fL:0,aR:0,fR:0} },
  { name:'Avslutning og pust', sub:'收势 · Shōu shì',
    desc:'Samle vekten jevnt på begge ben. Senk armene rolig ned langs sidene. Stå stille, lukk øynene, kjenn pusten og roen i 60 sekunder.',
    tip:'La pusten bli dypere for hvert utpust', duration:120, cls:'closing',
    from:{aL:10,fL:0,aR:-10,fR:0}, to:{aL:0,fL:0,aR:0,fR:0} }
];

let cur=0, timeLeft=0, timerId=null, running=false, workoutDateKey=null;

function startWorkout(key) {
  workoutDateKey = key;
  cur = 0; timeLeft = 0; running = false; clearInterval(timerId);
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('headerTimer').style.display = 'block';
  document.getElementById('timelineWrap').style.display = 'block';
  renderWorkout();
}

function goCalendar() {
  clearInterval(timerId); running = false;
  renderCalendar();
}

function renderTimeline() {
  const tlEl = document.getElementById('timeline');
  tlEl.innerHTML = exercises.map((ex,i) => {
    const sec = sectionOf(i);
    let cls = sec+'-dot';
    if (i < cur) cls += ' done';
    else if (i === cur) cls += ' active';
    const line = i < exercises.length-1
      ? `<div class="tl-line${i < cur?' done':''}"></div>` : '';
    return `<div class="tl-item">
      <div class="tl-dot ${cls}" onclick="jumpTo(${i})">${i < cur ? '' : i+1}</div>
      ${line}
    </div>`;
  }).join('');
  const activeDot = tlEl.querySelector('.active');
  if (activeDot) activeDot.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function fmt(s){ return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }

function renderWorkout() {
  renderTimeline();
  const headerTimer = document.getElementById('headerTimer');

  if (cur >= exercises.length) {
    if (workoutDateKey) saveDay(workoutDateKey);
    document.getElementById('app').innerHTML = `
      <div class="main"><div class="complete">
        <h2>Fullf&oslash;rt</h2>
        <p>Dagen er registrert i kalenderen.</p>
        <button onclick="goCalendar()">Tilbake til kalender</button>
      </div></div>`;
    headerTimer.textContent = '0:00';
    return;
  }

  const ex = exercises[cur];
  if (timeLeft === 0) timeLeft = ex.duration;
  headerTimer.textContent = fmt(timeLeft);

  const secHtml = ex.section
    ? `<div class="section-badge ${ex.section}">${ex.sectionName} · ${ex.sectionTime}</div>` : '';
  const tipHtml = ex.tip ? `<div class="exercise-tip">${ex.tip}</div>` : '';

  document.getElementById('app').innerHTML = `<div class="main">
    ${secHtml}
    <div class="exercise-number">ØVELSE ${cur+1} / ${exercises.length}</div>
    <div class="exercise-name">${ex.name}</div>
    <div class="exercise-sub">${ex.sub}</div>
    ${tipHtml}
    <div class="illustration">${pair(ex.cls, ex.from, ex.to, cur)}</div>
    <div class="ex-progress"><div class="ex-progress-bar" id="exBar" style="width:${(timeLeft/ex.duration*100)}%"></div></div>
    <div class="exercise-description">${ex.desc}</div>
    <div class="buttons">
      <button id="toggleBtn" onclick="toggle()">${running?'Pause':'Start'}</button>
      <button class="secondary" onclick="next()">${cur===exercises.length-1?'Fullfør':'Neste ›'}</button>
    </div>
  </div>`;
}

function updateTimer() {
  document.getElementById('headerTimer').textContent = fmt(timeLeft);
  const exBar = document.getElementById('exBar');
  const ex = exercises[cur];
  if (exBar && ex) exBar.style.width = (timeLeft / ex.duration * 100) + '%';
}

function toggle() {
  if (running) {
    clearInterval(timerId); running = false;
    const btn = document.getElementById('toggleBtn');
    if (btn) btn.textContent = 'Start';
  } else {
    running = true;
    const btn = document.getElementById('toggleBtn');
    if (btn) btn.textContent = 'Pause';
    timerId = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) { clearInterval(timerId); running = false; next(); }
    }, 1000);
  }
}

function next() { clearInterval(timerId); running = false; cur++; timeLeft = 0; renderWorkout(); }
function jumpTo(i) { clearInterval(timerId); running = false; cur = i; timeLeft = 0; renderWorkout(); }

// ── INIT ──
initCal();
renderCalendar();
</script>
